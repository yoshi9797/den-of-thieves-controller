<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blink and Lose: Den of Thieves - Controller</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- PROFESSIONAL CENTERED CONTROLLER PROTOCOLS --- */
        :root {
            --bg-dark: #12141c;
            --panel-dark: #1a1d29;
            --text-light: #f0f2f5;
            --text-muted: #8a90a6;
            --accent-gold: #e5b842;
            --accent-gold-hover: #f2ca5c;
            --btn-red: #ff4a5a;
            --btn-green: #34d399;
            --btn-blue: #3b82f6;
            --btn-purple: #a855f7;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-stack);
            height: 100%;
            overflow: hidden;
            width: 100%;
        }

        .controller-container {
            align-items: center;
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: center;
            padding: 24px;
            width: 100%;
        }

        .window-view {
            width: 100%;
            max-width: 360px;
        }

        /* --- AUTH LOBBY VIEW PANEL --- */
        #lobby-screen {
            background: var(--panel-dark);
            border: 1px solid rgba(229, 184, 66, 0.15);
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
            padding: 36px 24px;
            text-align: center;
        }

        .branding h1 {
            color: var(--accent-gold);
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .branding .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 36px;
            text-transform: uppercase;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .input-group label {
            color: var(--text-light);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .input-group input {
            background-color: rgba(0, 0, 0, 0.3);
            border: 1.5px solid rgba(240, 242, 245, 0.12);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: 500;
            padding: 14px;
            text-align: center;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .input-group input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(229, 184, 66, 0.15);
            outline: none;
        }

        #room-input {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        #room-input::placeholder {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .submit-btn {
            background-color: var(--accent-gold);
            border: none;
            border-radius: 8px;
            color: #000;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-top: 8px;
            padding: 16px;
            text-transform: uppercase;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        #error-msg {
            color: var(--btn-red);
            font-size: 0.9rem;
            font-weight: 700;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- CONNECTING LOADER LAYOUT --- */
        .loader-layout {
            align-items: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .spinner {
            border: 3.5px solid rgba(240, 242, 245, 0.05);
            border-top: 3.5px solid var(--accent-gold);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        .loader-layout h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .loader-layout p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            max-width: 300px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- CONTROLLER BUTTON SYSTEM COORDS --- */
        .gamepad-layout {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .action-row, .investigate-row, .voting-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        /* Multi-button rows share space equally */
        .investigate-row .game-btn, .voting-row .game-btn {
            flex: 1; 
            font-size: 0.95rem;
            padding: 10px 4px;
        }

        .game-btn {
            align-items: center;
            background: var(--panel-dark);
            border: 1px solid rgba(240, 242, 245, 0.1);
            border-radius: 12px;
            color: var(--text-light);
            cursor: pointer;
            display: flex;
            font-size: 1.1rem;
            font-weight: 700;
            height: 72px;
            justify-content: center;
            text-transform: uppercase;
            transition: background 0.15s, transform 0.1s, border-color 0.15s;
            width: 100%;
        }

        /* Tactical Investigation Actions */
        .game-btn.action-bust {
            border-color: rgba(168, 85, 247, 0.3);
        }
        .game-btn.action-bust:active {
            background-color: rgba(168, 85, 247, 0.15);
        }

        .game-btn.action-watch {
            border-color: rgba(59, 130, 246, 0.3);
        }
        .game-btn.action-watch:active {
            background-color: rgba(59, 130, 246, 0.15);
        }

        /* Distinct color accents for voting states */
        .game-btn.vote-g {
            border-color: rgba(255, 74, 90, 0.3);
        }
        .game-btn.vote-g:active {
            background-color: rgba(255, 74, 90, 0.15);
        }

        .game-btn.vote-i {
            border-color: rgba(52, 211, 153, 0.3);
        }
        .game-btn.vote-i:active {
            background-color: rgba(52, 211, 153, 0.15);
        }

        .game-btn.vote-ignore {
            border-color: rgba(138, 144, 166, 0.3);
        }
        .game-btn.vote-ignore:active {
            background-color: rgba(138, 144, 166, 0.15);
        }

        .game-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <main class="controller-container">

        <!-- SCREEN 1: THE LOBBY MATCHMAKING PORTAL -->
        <section id="lobby-screen" class="window-view">
            <header class="branding">
                <h1>Blink and Lose</h1>
                <p class="subtitle">Mobile Connecter</p>
            </header>

            <form id="join-form" class="auth-form">
                <div class="input-group">
                    <label for="room-input">Your Room Code</label>
                    <input 
                        type="text" 
                        id="room-input" 
                        placeholder="Your Room Code" 
                        maxlength="4" 
                        autocomplete="off" 
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="name-input">Your Name</label>
                    <input 
                        type="text" 
                        id="name-input" 
                        placeholder="Your Name" 
                        maxlength="16" 
                        autocomplete="off"
                        required
                    >
                </div>

                <div id="error-msg" style="display: none;">
                    Room Code Not Found!
                </div>

                <button type="submit" class="submit-btn">Connect to Session</button>
            </form>
        </section>


        <!-- SCREEN 2: THE ASYNCHRONOUS WEBRTC CONNECTING SHIELD -->
        <section id="connecting-screen" class="window-view" style="display: none;">
            <div class="loader-layout">
                <div class="spinner"></div>
                <h2>Securing Network Connection...</h2>
                <p>Establishing a connection to the host's game.</p>
            </div>
        </section>


        <!-- SCREEN 3: THE GAMEPAD PLATFORM -->
        <section id="gamepad-screen" class="window-view" style="display: none;">
            <div class="gamepad-layout">
                
                <div class="action-row">
                    <button class="game-btn accept" data-action="accept_move">
                        <span class="btn-label">Accept Move</span>
                    </button>
                </div>

                <div class="action-row">
                    <button class="game-btn cheat" data-action="cheat">
                        <span class="btn-label">Commit Cheat</span>
                    </button>
                </div>

                <!-- INVESTIGATION ROW: BUST SUSPECT & SET WATCHPOINT -->
                <div class="investigate-row">
                    <button class="game-btn action-bust" data-action="bust_suspect">
                        <span class="btn-label">Bust Suspect</span>
                    </button>
                    <button class="game-btn action-watch" data-action="set_watchpoint">
                        <span class="btn-label">Set Watchpoint</span>
                    </button>
                </div>

                <!-- VOTING LAYOUT ROW -->
                <div class="voting-row">
                    <button class="game-btn vote vote-g" data-action="vote_guilty">
                        <span class="btn-label">Guilty</span>
                    </button>
                    <button class="game-btn vote vote-ignore" data-action="vote_abstain">
                        <span class="btn-label">Ignore</span>
                    </button>
                    <button class="game-btn vote vote-i" data-action="vote_innocent">
                        <span class="btn-label">Innocent</span>
                    </button>
                </div>

            </div>
        </section>

    </main>

    <script src="controller.js"></script>
</body>
</html>
