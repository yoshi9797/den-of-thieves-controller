<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Gamepad Controller</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Include the Core Firebase SDK and Realtime Database directly from CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <!-- LOBBY LOGIN SCREEN -->
    <div id="login-screen" class="view">
        <h2>Blink and Lose</h2>
        <input type="text" id="player-name" placeholder="Enter Name" maxlength="12">
        <input type="text" id="room-code" placeholder="4-Letter Code" maxlength="4">
        <button id="join-btn" onclick="connectToLobby()">JOIN GAME</button>
        <p id="status-text">Disconnected</p>
    </div>

    <!-- GAMEPAD GAMEPLAY SCREEN -->
    <div id="gamepad-screen" class="view hidden">
        <div id="d-pad">
            <button class="btn" ontouchstart="sendInput('move_left', true)" ontouchend="sendInput('move_left', false)">◀</button>
            <button class="btn" ontouchstart="sendInput('move_right', true)" ontouchend="sendInput('move_right', false)">▶</button>
        </div>
        <div id="action-buttons">
            <button class="btn action-btn" ontouchstart="sendInput('action_steal', true)" ontouchend="sendInput('action_steal', false)">STEAL</button>
        </div>
    </div>

    <script src="controller.js"></script>
</body>
</html>
