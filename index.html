<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blink and Lose: Den of Thieves - Controller</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- PROFESSIONAL CENTERED CONTROLLER PROTOCOLS --- */
        :root {
            --bg-dark: #12141c;
            --panel-dark: #1a1d29;
            --text-light: #f0f2f5;
            --text-muted: #8a90a6;
            --accent-gold: #e5b842;
            --accent-gold-hover: #f2ca5c;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-stack);
            height: 100%;
            overflow: hidden;
            width: 100%;
        }

        /* The main viewport wrapper now forces all contents to absolute dead center */
        .controller-container {
            align-items: center;
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: center;
            padding: 24px;
            width: 100%;
        }

        .window-view {
            width: 100%;
            max-width: 360px; /* Clean boundary layout optimized for mobile aspect ratios */
        }

        /* --- AUTH LOBBY VIEW PANEL --- */
        #lobby-screen {
            background: var(--panel-dark);
            border: 1px solid rgba(229, 184, 66, 0.15);
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
            padding: 36px 24px;
            text-align: center;
        }

        .branding h1 {
            color: var(--accent-gold);
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .branding .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 36px;
            text-transform: uppercase;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: center; /* Centers the field label tags */
        }

        .input-group label {
            color: var(--text-light);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .input-group input {
            background-color: rgba(0, 0, 0, 0.3);
            border: 1.5px solid rgba(240, 242, 245, 0.12);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: 500;
            padding: 14px;
            text-align: center; /* Centers input text fields natively */
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .input-group input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(229, 184, 66, 0.15);
            outline: none;
        }

        /* Direct font alignment rules for Room Entry block formatting */
        #room-input {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        #room-input::placeholder {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .submit-btn {
            background-color: var(--accent-gold);
            border: none;
            border-radius: 8px;
            color: #000;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-top: 8px;
            padding: 16px;
            text-transform: uppercase;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        /* --- CONNECTING LOADER LAYOUT --- */
        .loader-layout {
            align-items: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .spinner {
            border: 3.5px solid rgba(240, 242, 245, 0.05);
            border-top: 3.5px solid var(--accent-gold);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        .loader-layout h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .loader-layout p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            max-width: 300px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- CONTROLLER BUTTON SYSTEM COORDS --- */
        .gamepad-layout {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .action-row, .voting-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .game-btn {
            align-items: center;
            background: var(--panel-dark);
            border: 1px solid rgba(240, 242, 245, 0.1);
            border-radius: 12px;
            color: var(--text-light);
            cursor: pointer;
            display: flex;
            font-size: 1.1rem;
            font-weight: 700;
            height: 72px;
            justify-content: center;
            text-transform: uppercase;
            transition: background 0.15s, transform 0.1s;
            width: 100%;
        }

        .game-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <main class="controller-container">

    <section id="lobby-screen" class="window-view">
            <header class="branding">
                <h1>Blink and Lose</h1>
                <p class="subtitle">Companion Controller</p>
            </header>

            <form id="join-form" class="auth-form">
                <div class="input-group">
                    <label for="room-input">Lobby Code</label>
                    <input 
                        type="text" 
                        id="room-input" 
                        placeholder="Enter Lobby Code" 
                        maxlength="4" 
                        autocomplete="off" 
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="name-input">Your Name</label>
                    <input 
                        type="text" 
                        id="name-input" 
                        placeholder="Enter Your Name" 
                        maxlength="16" 
                        autocomplete="off"
                        required
                    >
                </div>

                <div id="error-msg" style="display: none; color: #ff4a5a; font-size: 0.9rem; font-weight: 700; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.5px;">
                    Lobby Code Not Found!
                </div>

                <button type="submit" class="submit-btn">Join Session</button>
            </form>
        </section>


        <section id="connecting-screen" class="window-view" style="display: none;">
            <div class="loader-layout">
                <div class="spinner"></div>
                <h2>Securing Network Connection...</h2>
                <p>Connecting to the game host</p>
            </div>
        </section>


        <section id="gamepad-screen" class="window-view" style="display: none;">
            <div class="gamepad-layout">
                
                <div class="action-row">
                    <button class="game-btn accept" data-action="accept_move">
                        <span class="btn-label">Accept Move</span>
                    </button>
                </div>

                <div class="action-row">
                    <button class="game-btn cheat" data-action="cheat">
                        <span class="btn-label">Commit Cheat</span>
                    </button>
                </div>

                <div class="voting-row">
                    <button class="game-btn vote" data-action="vote_guilty">
                        <span class="btn-label">Guilty</span>
                    </button>
                    <button class="game-btn vote" data-action="vote_innocent">
                        <span class="btn-label">Innocent</span>
                    </button>
                </div>

            </div>
        </section>

    </main>

    <script src="controller.js"></script>
</body>
</html>
