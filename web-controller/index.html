<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Game Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Connection panel -->
        <div id="connection-panel">
            <div id="status-indicator" class="status-disconnected"></div>
            <span id="status-text">Disconnected</span>
            <div id="host-row">
                <input type="text" id="host-input" placeholder="http://192.168.1.117:3000" value="http://localhost:3000">
                <button id="connect-btn">Connect</button>
            </div>
        </div>

        <!-- Gamepad controls (signal-gated) -->
        <div id="gamepad" class="disabled">
            <!-- D-pad -->
            <div id="controls">
                <div id="dpad">
                    <button class="dpad-btn control-disabled" id="btn-up" data-action="move_up" aria-label="Move up">^</button>
                    <div class="dpad-row">
                        <button class="dpad-btn control-disabled" id="btn-left" data-action="move_left" aria-label="Move left">&lt;</button>
                        <div class="dpad-center"></div>
                        <button class="dpad-btn control-disabled" id="btn-right" data-action="move_right" aria-label="Move right">&gt;</button>
                    </div>
                    <button class="dpad-btn control-disabled" id="btn-down" data-action="move_down" aria-label="Move down">v</button>
                </div>
            </div>

            <!-- Bust button - large primary action (~30% of gamepad area) -->
            <button type="button" id="bust-btn" class="control-disabled" data-action="bust" aria-label="Bust">BUST</button>

            <!-- Action buttons row -->
            <div id="action-row">
                <button type="button" class="action-btn control-disabled" id="btn-accept" data-action="accept_move" aria-label="Accept Move">Accept Move</button>
                <button type="button" class="action-btn control-disabled" id="btn-cheat" data-action="cheat" aria-label="Cheat">Cheat</button>
                <button type="button" class="action-btn control-disabled" id="btn-vote" data-action="vote" aria-label="Vote">Vote</button>
            </div>

            <!-- Till value displays (read-only status) -->
            <div id="till-row">
                <button type="button" class="till-display control-disabled" data-till="left_player" aria-label="Player to my left till" disabled>
                    <span class="till-label">P Left</span>
                    <span class="till-value" id="till-left-player">---</span>
                </button>
                <button type="button" class="till-display control-disabled" data-till="my_left" aria-label="My left till" disabled>
                    <span class="till-label">My Left</span>
                    <span class="till-value" id="till-my-left">---</span>
                </button>
                <button type="button" class="till-display control-disabled" data-till="my_right" aria-label="My right till" disabled>
                    <span class="till-label">My Right</span>
                    <span class="till-value" id="till-my-right">---</span>
                </button>
                <button type="button" class="till-display control-disabled" data-till="right_player" aria-label="Player to my right till" disabled>
                    <span class="till-label">P Right</span>
                    <span class="till-value" id="till-right-player">---</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="controller.js"></script>
</body>
</html>
